# @package _global_

# Minimal EdgeTAM-TinyViT video distillation training config.
# Intended for smoke runs and company-side adaptation, not full-scale defaults.

scratch:
  resolution: 1024
  train_batch_size: 1
  num_train_workers: 2
  num_frames: 8
  max_num_objects: 3
  base_lr: 5.0e-6
  vision_lr: 3.0e-6
  phases_per_epoch: 1
  num_epochs: 1

dataset:
  img_folder: data/edgetam_smoke/vos_style_from_sav_smoke/JPEGImages
  gt_folder: data/edgetam_smoke/vos_style_from_sav_smoke/Annotations
  file_list_txt: data/edgetam_smoke/vos_style_from_sav_smoke/val.txt
  multiplier: 1

vos:
  train_transforms:
    - _target_: training.dataset.transforms.ComposeAPI
      transforms:
        - _target_: training.dataset.transforms.RandomResizeAPI
          sizes: ${scratch.resolution}
          square: true
          consistent_transform: true
        - _target_: training.dataset.transforms.ToTensorAPI
        - _target_: training.dataset.transforms.NormalizeAPI
          mean: [0.485, 0.456, 0.406]
          std: [0.229, 0.224, 0.225]

trainer:
  _target_: training.trainer.Trainer
  mode: train_only
  max_epochs: ${times:${scratch.num_epochs},${scratch.phases_per_epoch}}
  accelerator: cuda
  seed_value: 250107256

  model:
    _target_: sam2_distill.edgetam.train_model.EdgeTAMTrainWithTeacher
    synthetic_teacher: true
    synthetic_teacher_offset: 0.01
    image_encoder_forward_batch_size: null
    image_encoder_activation_checkpoint: false
    image_encoder:
      _target_: sam2.modeling.backbones.image_encoder.ImageEncoder
      scalp: 1
      trunk:
        _target_: sam2_distill.edgetam.timm_backbone.TimmBackbone
        name: tiny_vit_21m_512.dist_in22k_ft_in1k
        pretrained: false
        features:
          - layer0
          - layer1
          - layer2
          - layer3
      neck:
        _target_: sam2.modeling.backbones.image_encoder.FpnNeck
        position_encoding:
          _target_: sam2.modeling.position_encoding.PositionEmbeddingSine
          num_pos_feats: 256
          normalize: true
          scale: null
          temperature: 10000
        d_model: 256
        backbone_channel_list: [576, 384, 192, 96]
        fpn_top_down_levels: [2, 3]
        fpn_interp_model: nearest

    memory_attention:
      _target_: sam2.modeling.memory_attention.MemoryAttention
      d_model: 256
      pos_enc_at_input: true
      layer:
        _target_: sam2.modeling.memory_attention.MemoryAttentionLayer
        activation: relu
        dim_feedforward: 2048
        dropout: 0.1
        pos_enc_at_attn: false
        self_attention:
          _target_: sam2.modeling.sam.transformer.RoPEAttention
          rope_theta: 10000.0
          feat_sizes: [32, 32]
          embedding_dim: 256
          num_heads: 1
          downsample_rate: 1
          dropout: 0.1
        d_model: 256
        pos_enc_at_cross_attn_keys: true
        pos_enc_at_cross_attn_queries: false
        cross_attention:
          _target_: sam2.modeling.sam.transformer.RoPEAttentionv2
          rope_theta: 10000.0
          q_sizes: [64, 64]
          k_sizes: [16, 16]
          embedding_dim: 256
          num_heads: 1
          downsample_rate: 1
          dropout: 0.1
          kv_in_dim: 64
      num_layers: 2

    memory_encoder:
      _target_: sam2.modeling.memory_encoder.MemoryEncoder
      out_dim: 64
      position_encoding:
        _target_: sam2.modeling.position_encoding.PositionEmbeddingSine
        num_pos_feats: 64
        normalize: true
        scale: null
        temperature: 10000
      mask_downsampler:
        _target_: sam2.modeling.memory_encoder.MaskDownSampler
        kernel_size: 3
        stride: 2
        padding: 1
      fuser:
        _target_: sam2.modeling.memory_encoder.Fuser
        layer:
          _target_: sam2.modeling.memory_encoder.CXBlock
          dim: 256
          kernel_size: 7
          padding: 3
          layer_scale_init_value: 1e-6
          use_dwconv: true
        num_layers: 2

    spatial_perceiver:
      _target_: sam2.modeling.perceiver.PerceiverResampler
      depth: 2
      dim: 64
      dim_head: 64
      heads: 1
      ff_mult: 4
      hidden_dropout_p: 0.0
      attention_dropout_p: 0.0
      pos_enc_at_key_value: true
      concat_kv_latents: false
      num_latents: 256
      num_latents_2d: 256
      position_encoding:
        _target_: sam2.modeling.position_encoding.PositionEmbeddingSine
        num_pos_feats: 64
        normalize: true
        scale: null
        temperature: 10000
      use_self_attn: true

    num_maskmem: 7
    image_size: ${scratch.resolution}
    sigmoid_scale_for_mem_enc: 20.0
    sigmoid_bias_for_mem_enc: -10.0
    use_mask_input_as_output_without_sam: true
    directly_add_no_mem_embed: true
    use_high_res_features_in_sam: true
    multimask_output_in_sam: true
    iou_prediction_use_sigmoid: true
    use_obj_ptrs_in_encoder: true
    add_tpos_enc_to_obj_ptrs: false
    only_obj_ptrs_in_the_past_for_eval: true
    max_obj_ptrs_in_encoder: 16
    pred_obj_scores: true
    pred_obj_scores_mlp: true
    fixed_no_obj_ptr: true
    multimask_output_for_tracking: true
    use_multimask_token_for_obj_ptr: true
    multimask_min_pt_num: 0
    multimask_max_pt_num: 1
    use_mlp_for_obj_ptr_proj: true
    compile_image_encoder: false

    prob_to_use_pt_input_for_train: 0.5
    prob_to_use_box_input_for_train: 0.5
    prob_to_sample_from_gt_for_train: 0.1
    num_frames_to_correct_for_train: 2
    rand_frames_to_correct_for_train: true
    add_all_frames_to_correct_as_cond: true
    num_init_cond_frames_for_train: 2
    rand_init_cond_frames_for_train: true
    num_correction_pt_per_frame: 7
    use_act_ckpt_iterative_pt_sampling: false
    prob_to_use_pt_input_for_eval: 0.0
    prob_to_use_box_input_for_eval: 0.0
    num_frames_to_correct_for_eval: 1
    num_init_cond_frames_for_eval: 1
    forward_backbone_per_frame_for_eval: true

  data:
    train:
      _target_: training.dataset.sam2_datasets.TorchTrainMixedDataset
      phases_per_epoch: ${scratch.phases_per_epoch}
      batch_sizes:
        - ${scratch.train_batch_size}
      datasets:
        - _target_: training.dataset.utils.RepeatFactorWrapper
          dataset:
            _target_: training.dataset.utils.ConcatDataset
            datasets:
              - _target_: training.dataset.vos_dataset.VOSDataset
                transforms: ${vos.train_transforms}
                training: true
                video_dataset:
                  _target_: training.dataset.vos_raw_dataset.PNGRawDataset
                  img_folder: ${dataset.img_folder}
                  gt_folder: ${dataset.gt_folder}
                  file_list_txt: ${dataset.file_list_txt}
                sampler:
                  _target_: training.dataset.vos_sampler.RandomUniformSampler
                  num_frames: ${scratch.num_frames}
                  max_num_objects: ${scratch.max_num_objects}
                multiplier: ${dataset.multiplier}
      shuffle: true
      num_workers: ${scratch.num_train_workers}
      pin_memory: true
      drop_last: true
      collate_fn:
        _target_: training.utils.data_utils.collate_fn
        _partial_: true
        dict_key: all

  loss:
    all:
      _target_: sam2_distill.edgetam.distillation_losses.EdgeTAMMultiStepDistillationLoss
      lambda_img: 0.5
      lambda_mem: 0.25
      task_loss:
        _target_: training.loss_fns.MultiStepMultiMasksAndIous
        weight_dict:
          loss_mask: 20
          loss_dice: 1
          loss_iou: 1
          loss_class: 1
        supervise_all_iou: true
        iou_use_l1_loss: true
        pred_obj_scores: true
        focal_gamma_obj_score: 0.0
        focal_alpha_obj_score: -1.0

  optim:
    amp:
      enabled: true
      amp_dtype: bfloat16
    optimizer:
      _target_: torch.optim.AdamW
    gradient_clip:
      _target_: training.optimizer.GradientClipper
      max_norm: 0.1
      norm_type: 2
    options:
      lr:
        - scheduler:
            _target_: fvcore.common.param_scheduler.ConstantParamScheduler
            value: ${scratch.base_lr}
        - scheduler:
            _target_: fvcore.common.param_scheduler.ConstantParamScheduler
            value: ${scratch.vision_lr}
          param_names:
            - image_encoder.*
      weight_decay:
        - scheduler:
            _target_: fvcore.common.param_scheduler.ConstantParamScheduler
            value: 0.1

  distributed:
    backend: nccl
    find_unused_parameters: true

  logging:
    tensorboard_writer:
      _target_: training.utils.logger.make_tensorboard_logger
      log_dir: runs/edgetam_smoke/full_trainer/tensorboard
      flush_secs: 120
      should_log: true
    log_dir: runs/edgetam_smoke/full_trainer/logs
    log_freq: 1

  checkpoint:
    save_dir: runs/edgetam_smoke/full_trainer/checkpoints
    save_freq: 0

launcher:
  num_nodes: 1
  gpus_per_node: 1
  experiment_log_dir: runs/edgetam_smoke/full_trainer
